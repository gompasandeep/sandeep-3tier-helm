apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandeep-mongodb
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandeep-mongodb
  template:
    metadata:
      labels:
        app: sandeep-mongodb
    spec:
      containers:
      - name: mongodb
        image: {{ .Values.mongodb.image }}:{{ .Values.mongodb.tag }}
        ports:
        - containerPort: 27017
