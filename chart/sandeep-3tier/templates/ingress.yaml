apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandeep-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sandeep-frontend
            port:
              number: 80

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: sandeep-backend
            port:
              number: 3000
